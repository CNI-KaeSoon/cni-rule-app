name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/windows-build.yml"
  pull_request:
    paths:
      - "**"
      - ".github/workflows/windows-build.yml"

jobs:
  windows-installer:
    name: Build NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        if: ${{ hashFiles('app/package-lock.json') != '' }}
        run: npm ci
        working-directory: app

      - name: Run Rust tests
        run: cargo test -p pack-updater

      - name: Build Tauri NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          # Required when release signing is enabled:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Optional for publishing GitHub Releases:
          # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          args: --bundles nsis

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cni-rule-windows-installer
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
